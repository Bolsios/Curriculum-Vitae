<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Galería de Certificaciones — Josseph Steven Bolsios Cortés</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;600;800&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
  
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      /* Paleta Premium: Naranja Vibrante, Cyan y tonos oscuros profundos */
      --acc: #ff6a00; 
      --acc-alt: #00c6ff;
      --acc-glow: rgba(255, 106, 0, 0.25);
      --bg: #090b10;
      --bg2: #12161f;
      --border: rgba(255, 255, 255, 0.06);
      --text: #f0f2f5;
      --text-muted: rgba(240, 242, 245, 0.5);
      --nav-h: 72px;
      --max-w: 1140px;
    }

    body {
      font-family: 'Barlow', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
      min-height: 100vh;
      line-height: 1.5;
    }

    /* --- CAPAS DE FONDO TECNOLÓGICO --- */
    .bg-layer { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    .bg-overlay { 
      position: absolute; inset: 0; 
      background: radial-gradient(circle at 15% 15%, rgba(0, 198, 255, 0.07), transparent 45%),
                  radial-gradient(circle at 85% 25%, rgba(255, 106, 0, 0.07), transparent 45%);
    }
    .bg-grid { 
      position: absolute; inset: 0; 
      background-image: linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px), 
                        linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px); 
      background-size: 50px 50px; 
    }

    .container {
      width: 100%;
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 0 24px;
    }

    /* --- NAVBAR --- */
    header.navbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: var(--nav-h); background: rgba(9, 11, 16, 0.85); backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }
    .nav-inner {
      height: 100%; display: flex; align-items: center; justify-content: space-between;
    }
    .brand { display: flex; align-items: center; gap: 14px; }
    .brand .logo {
      font-family: 'Barlow Condensed'; font-weight: 800; font-size: 18px;
      background: linear-gradient(135deg, var(--acc), var(--acc-alt));
      color: #090b10; width: 38px; height: 38px; display: flex; 
      align-items: center; justify-content: center; border-radius: 4px;
      box-shadow: 0 0 12px var(--acc-glow);
    }
    .brand-text-main { font-family: 'Barlow Condensed'; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; font-size: 16px; line-height: 1.1; }
    .brand-text-sub { font-size: 11px; color: var(--text-muted); }

    nav.nav-links { display: flex; gap: 8px; }
    nav.nav-links a {
      color: var(--text-muted); text-decoration: none; font-size: 12px; text-transform: uppercase;
      letter-spacing: 1px; font-weight: 500; padding: 8px 16px; transition: .3s; border-radius: 4px;
    }
    nav.nav-links a:hover { color: #fff; background: rgba(255,255,255,0.05); }

    /* --- TITULO DE LA GALERÍA --- */
    .gallery-header {
      padding-top: calc(var(--nav-h) + 40px);
      margin-bottom: 32px;
      position: relative;
      z-index: 1;
    }
    .gallery-header h1 {
      font-family: 'Barlow Condensed';
      font-weight: 800;
      font-size: 32px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #fff;
    }
    .gallery-header p {
      color: var(--text-muted);
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--acc-alt);
      margin-top: 2px;
    }

    /* --- CUADRÍCULA DE LA GALERÍA --- */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      position: relative;
      z-index: 1;
      margin-bottom: 60px;
    }

    .thumb-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      aspect-ratio: 4 / 3;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.2, 1, 0.3, 1);
      position: relative;
      opacity: 0;
      animation: fadeUp 0.6s ease both;
    }
    .thumb-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.8;
      transition: all 0.3s ease;
    }
    .thumb-card:hover {
      border-color: var(--acc);
      transform: translateY(-4px);
      box-shadow: 0 12px 30px rgba(255, 106, 0, 0.15);
    }
    .thumb-card:hover img {
      opacity: 1;
      transform: scale(1.02);
    }

    /* --- SISTEMA LIGHTBOX MODAL --- */
    .lightbox-modal {
      position: fixed;
      inset: 0;
      background: rgba(5, 7, 10, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      padding: 20px;
    }
    .lightbox-modal.open {
      opacity: 1;
      pointer-events: auto;
    }
    .lightbox-content {
      max-width: 90%;
      max-height: 85vh;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 20px 50px rgba(0,0,0,0.7);
      border-radius: 4px;
      transform: scale(0.95);
      transition: transform 0.3s ease;
    }
    .lightbox-modal.open .lightbox-content {
      transform: scale(1);
    }
    .lightbox-close {
      position: absolute;
      top: 24px; right: 24px;
      background: none; border: none;
      color: #fff; font-size: 36px; cursor: pointer;
      line-height: 1; opacity: 0.6; transition: opacity 0.25s;
    }
    .lightbox-close:hover { opacity: 1; color: var(--acc); }

    /* --- FOOTER --- */
    footer {
      border-top: 1px solid var(--border); padding: 24px 0; background: #07090d;
      position: relative; z-index: 1; font-size: 13px; margin-top: auto;
    }
    .foot-row { display: flex; justify-content: space-between; align-items: center; }

    /* --- ANIMACIONES --- */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* --- RESPONSIVO --- */
    @media (max-width: 960px) {
      .gallery-grid { grid-template-columns: repeat(2, 1fr); gap: 20px; }
    }
    @media (max-width: 640px) {
      .nav-links { display: none; }
      .gallery-grid { grid-template-columns: 1fr; gap: 16px; }
      .foot-row { flex-direction: column; gap: 8px; text-align: center; }
    }
  </style>
</head>
<body>

  <div class="bg-layer">
    <div class="bg-overlay"></div>
    <div class="bg-grid"></div>
  </div>

  <header class="navbar" role="banner">
    <div class="container nav-inner">
      <div class="brand">
        <div class="logo">CV</div>
        <div>
          <div class="brand-text-main">Josseph Steven Bolsios Cortés</div>
          <div class="brand-text-sub">Expediente de Acreditaciones Técnicas</div>
        </div>
      </div>
      <nav class="nav-links" aria-label="Navegación principal">
        <a href="index.html">Volver al Perfil</a>
      </nav>
    </div>
  </header>

  <div class="container gallery-header">
    <h1>Galería de Títulos y Certificaciones</h1>
    <p>Acreditaciones en Seguridad Electrónica, Redes y Formación Académica</p>
  </div>

  <main class="container gallery-grid" role="main">
    
    <div class="thumb-card" onclick="openLightbox(this)">
      <img src="Media/Bachi.jpg" alt="Bachiller en Educación Media - Liceo Braulio Carrillo Colina">
    </div>

    <div class="thumb-card" onclick="openLightbox(this)">
      <img src="Media/hik.png" alt="Hikvision Certified Security Associate - HCSA Security CCTV & Intercom">
    </div>

    <div class="thumb-card" onclick="openLightbox(this)">
      <img src="Media/intro.png" alt="Cisco Networking Academy - Introduction to Cybersecurity">
    </div>

    <div class="thumb-card" onclick="openLightbox(this)">
      <img src="Media/soni 1.jpg" alt="SoniVisión S.A. - Fundamentos CCTV Especificaciones Nivel 1">
    </div>

    <div class="thumb-card" onclick="openLightbox(this)">
      <img src="Media/soni 2.jpg" alt="SoniVisión S.A. - Fundamentos de la Seguridad Humana y Protección Contra Incendios">
    </div>

    <div class="thumb-card" onclick="openLightbox(this)">
      <img src="Media/unifi.jpg" alt="Ubiquiti Academy Certification - UNP UniFi Network Professional">
    </div>

    <div class="thumb-card" onclick="openLightbox(this)">
      <img src="Media/WhatsApp Image 2026-05-31 at 1.35.26 AM.jpeg" alt="ZKTeco Centroamérica - Solución de Control de Acceso con Software basados en Web Bio ZLink y SenseFace Series">
    </div>

    <div class="thumb-card" onclick="openLightbox(this)">
      <img src="Media/WhatsApp Image 2026-05-31 at 1.35.26 AM (1).jpeg" alt="ZKTeco Centroamérica - Solución de Gestión de Acceso Vehicular">
    </div>

    <div class="thumb-card" onclick="openLightbox(this)">
      <img src="Media/WhatsApp Image 2026-05-31 at 1.35.26 AM (2).jpeg" alt="ZKTeco Centroamérica - Soluciones Integrales de Tiempo & Asistencia Integradas con Software de ZKTeco">
    </div>

    <div class="thumb-card" onclick="openLightbox(this)">
      <img src="Media/WhatsApp Image 2026-05-31 at 1.35.27 AM.jpeg" alt="ZKTeco Centroamérica - Soluciones Integrales de Control de Acceso Integradas con Software de ZKTeco">
    </div>

  </main>

  <footer>
    <div class="container">
      <div class="foot-row">
        <p>© <strong>MiCV</strong> — Panel Informativo Profesional</p>
        <p class="muted-small">Diseñado con IA y personalizado con habilidad humana</p>
      </div>
    </div>
  </footer>

  <div id="lightbox" class="lightbox-modal" onclick="closeLightbox()">
    <button class="lightbox-close">&times;</button>
    <img id="lightboxImg" class="lightbox-content" src="" alt="Vista ampliada de la certificación">
  </div>

  <script>
    function openLightbox(cardElement) {
      const modal = document.getElementById('lightbox');
      const modalImg = document.getElementById('lightboxImg');
      const targetImgSrc = cardElement.querySelector('img').src;
      const targetImgAlt = cardElement.querySelector('img').alt;

      modalImg.src = targetImgSrc;
      modalImg.alt = targetImgAlt;
      modal.classList.add('open');
    }

    function closeLightbox() {
      const modal = document.getElementById('lightbox');
      modal.classList.remove('open');
    }

    // Efecto Stagger para que las tarjetas de la galería aparezcan escalonadas de forma fluida
    document.querySelectorAll('.thumb-card').forEach((el, i) => {
      el.style.animationDelay = (i * 0.05) + 's';
    });
  </script>
</body>
</html>
