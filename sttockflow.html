<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Video - Proyecto StockFlow Pro +</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    body {
      background: var(--bg-soft);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      font-family: var(--font-family);
      color: var(--text-primary);
      padding: 20px;
      box-sizing: border-box;
    }
    .video-container {
      position: relative;
      width: 90vw;
      max-width: 960px;
      height: 0;
      padding-bottom: 56.25%; /* 16:9 ratio */
      margin: 0 auto;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: var(--shadow-soft);
    }
    .video-container iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: 0;
    }
    .btn-back {
      margin-top: 24px;
      padding: 12px 20px;
      background: var(--color-primary-main);
      color: #fff;
      border: none;
      border-radius: var(--radius-btn);
      cursor: pointer;
      font-weight: 700;
      text-decoration: none;
      display: inline-block;
      transition: background 0.3s ease;
    }
    .btn-back:hover {
      background: var(--color-primary-light);
    }
  </style>
</head>
<body>
  <h1>Proyecto StockFlow Pro +</h1>
  <div class="video-container">
   <iframe 
  src="https://drive.google.com/file/d/1fTHcKlFAt2_-aoSQEJoXy5Oms6AvF6WG/preview" 
  width="640" height="360" 
  allow="autoplay; encrypted-media" 
  allowfullscreen>
</iframe>
  </div>
  <a href="portfolio.html" class="btn-back" title="Volver a Portafolio">← Volver a Portafolio</a>
</body>
</html>
